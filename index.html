<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .habit-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .habit-item:last-child { border-bottom: none; }
        .streak-badge { background-color: #ffc107; color: #000; font-weight: bold; }
        .history-list { max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-5">Habit Tracker</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4">
                    <h3>Add New Habit</h3>
                    <div class="input-group mb-3">
                        <input type="text" id="habitInput" class="form-control" placeholder="E.g., Meditation">
                        <button class="btn btn-primary" onclick="addHabit()">Add</button>
                    </div>
                    <hr>
                    <h3>Today's Habits</h3>
                    <div id="habitsList"></div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="row">
                    <div class="col-md-12">
                        <div class="card p-4">
                            <h3>Consistency Overview</h3>
                            <canvas id="habitChart" height="100"></canvas>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="card p-4">
                            <h3>Longest Streaks</h3>
                            <div id="streaksList"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card p-4">
                            <h3>History (Last 7 Days)</h3>
                            <div id="historyList" class="history-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let history = JSON.parse(localStorage.getItem('habitHistory')) || {};

        function save() {
            localStorage.setItem('habits', JSON.stringify(habits));
            localStorage.setItem('habitHistory', JSON.stringify(history));
            render();
            updateChart();
        }

        function addHabit() {
            const name = document.getElementById('habitInput').value.trim();
            if (name) {
                habits.push({ name: name, createdAt: new Date().toISOString(), streak: 0 });
                document.getElementById('habitInput').value = '';
                save();
            }
        }

        function toggleHabit(index) {
            const today = new Date().toISOString().split('T')[0];
            const habitName = habits[index].name;
            
            if (!history[today]) history[today] = [];
            
            const habitIndex = history[today].indexOf(habitName);
            if (habitIndex > -1) {
                history[today].splice(habitIndex, 1);
            } else {
                history[today].push(habitName);
            }
            
            calculateStreaks();
            save();
        }

        function calculateStreaks() {
            habits.forEach(habit => {
                let streak = 0;
                let checkDate = new Date();
                
                while (true) {
                    const dateStr = checkDate.toISOString().split('T')[0];
                    if (history[dateStr] && history[dateStr].includes(habit.name)) {
                        streak++;
                        checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        break;
                    }
                }
                habit.streak = streak;
            });
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            const list = document.getElementById('habitsList');
            list.innerHTML = habits.map((h, i) => {
                return '<div class="habit-item">' +
                    '<span>' + h.name + '</span>' +
                    '<input type="checkbox" class="form-check-input" ' + ((history[today] || []).includes(h.name) ? 'checked' : '') + ' onchange="toggleHabit(' + i + ')">' +
                '</div>';
            }).join('');

            const streakList = document.getElementById('streaksList');
            streakList.innerHTML = habits.sort((a,b) => b.streak - a.streak).map(h => {
                return '<div class="d-flex justify-content-between mb-2">' +
                    '<span>' + h.name + '</span>' +
                    '<span class="badge streak-badge">' + h.streak + ' days</span>' +
                '</div>';
            }).join('');

            const histList = document.getElementById('historyList');
            const dates = Object.keys(history).sort().reverse().slice(0, 7);
            histList.innerHTML = dates.map(date => {
                return '<div class="mb-2">' +
                    '<strong>' + date + ':</strong> ' + history[date].join(', ') +
                '</div>';
            }).join('');
        }

        let chart;
        function updateChart() {
            const ctx = document.getElementById('habitChart').getContext('2d');
            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                last7Days.push(d.toISOString().split('T')[0]);
            }

            const data = last7Days.map(date => (history[date] || []).length);

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7Days,
                    datasets: [{
                        label: 'Habits Completed',
                        data: data,
                        borderColor: '#0d6efd',
                        tension: 0.1,
                        fill: true,
                        backgroundColor: 'rgba(13, 110, 253, 0.1)'
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        }

        calculateStreaks();
        render();
        updateChart();
    </script>
</body>
</html>
