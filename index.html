<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-3xl font-bold text-gray-800">Habit Tracker</h1>
            <p class="text-gray-500">Track your progress and build consistency.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-700 mb-2">Current Streak</h2>
                <div class="flex items-center space-x-2">
                    <span id="streakCount" class="text-4xl font-bold text-blue-600">0</span>
                    <span class="text-gray-500">days</span>
                </div>
            </div>
            <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">Daily Check-in</h2>
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-600">Did you complete your habit today?</p>
                        <p id="todayDate" class="text-sm text-gray-400"></p>
                    </div>
                    <button id="checkInBtn" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition">
                        I Did It!
                    </button>
                </div>
            </div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Last 7 Days</h2>
            <canvas id="habitChart" height="100"></canvas>
        </div>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">History</h2>
            <div id="historyList" class="space-y-2"></div>
        </div>
    </div>
    <script>
        const STORAGE_KEY = "habit_tracker_data";
        let habitData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(habitData));
            updateUI();
        }
        function getTodayStr() { return new Date().toISOString().split("T")[0]; }
        function calculateStreak() {
            if (habitData.length === 0) return 0;
            const sorted = [...habitData].sort((a, b) => b.localeCompare(a));
            const lastEntry = sorted[0];
            const today = getTodayStr();
            const yesterday = new Date(Date.now() - 86400000).toISOString().split("T")[0];
            if (lastEntry !== today && lastEntry !== yesterday) return 0;
            let streak = 0;
            let checkDate = lastEntry;
            for (let i = 0; i < sorted.length; i++) {
                if (sorted[i] === checkDate) {
                    streak++;
                    const d = new Date(checkDate);
                    d.setDate(d.getDate() - 1);
                    checkDate = d.toISOString().split("T")[0];
                } else { break; }
            }
            return streak;
        }
        function updateUI() {
            const today = getTodayStr();
            const checkedToday = habitData.includes(today);
            document.getElementById("todayDate").textContent = new Date().toLocaleDateString(undefined, { weekday: "long", year: "numeric", month: "long", day: "numeric" });
            const btn = document.getElementById("checkInBtn");
            if (checkedToday) {
                btn.textContent = "Completed!";
                btn.disabled = true;
                btn.classList.replace("bg-blue-600", "bg-green-500");
            } else {
                btn.textContent = "I Did It!";
                btn.disabled = false;
                btn.classList.add("bg-blue-600");
                btn.classList.remove("bg-green-500");
            }
            document.getElementById("streakCount").textContent = calculateStreak();
            const list = document.getElementById("historyList");
            list.innerHTML = habitData.slice().reverse().map(date => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                    <span class="text-gray-700 font-medium">${new Date(date).toLocaleDateString()}</span>
                    <span class="text-green-600 text-sm font-bold uppercase">Success</span>
                </div>
            `).join("") || '<p class="text-gray-400 italic">No check-ins yet.</p>';
            updateChart();
        }
        let chart;
        function updateChart() {
            const ctx = document.getElementById("habitChart").getContext("2d");
            const last7Days = [];
            const labels = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const str = d.toISOString().split("T")[0];
                last7Days.push(habitData.includes(str) ? 1 : 0);
                labels.push(d.toLocaleDateString(undefined, { weekday: "short" }));
            }
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Check-ins",
                        data: last7Days,
                        backgroundColor: "#2563eb",
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 1, ticks: { display: false }, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
        document.getElementById("checkInBtn").addEventListener("click", () => {
            const today = getTodayStr();
            if (!habitData.includes(today)) {
                habitData.push(today);
                save();
            }
        });
        updateUI();
    </script>
</body>
</html>
