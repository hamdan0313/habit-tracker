<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e94560;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
        }
        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        header p {
            color: #a0a0a0;
            margin-top: 10px;
        }
        .add-habit {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .add-habit h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #e94560;
            color: white;
        }
        .btn-primary:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }
        .btn-danger {
            background: #533483;
            color: white;
            padding: 8px 15px;
            font-size: 0.85rem;
        }
        .btn-danger:hover {
            background: #7a4d9c;
        }
        .btn-check {
            background: #0f3460;
            color: #4ade80;
            border: 2px solid #4ade80;
            padding: 8px 15px;
            font-size: 0.85rem;
        }
        .btn-check:hover {
            background: #4ade80;
            color: #0f3460;
        }
        .btn-check.checked {
            background: #4ade80;
            color: #0f3460;
        }
        .habits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .habit-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.3s ease;
        }
        .habit-card:hover {
            transform: translateY(-5px);
            border-color: rgba(233, 69, 96, 0.5);
        }
        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .habit-name {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
        }
        .habit-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #a0a0a0;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }
        .habit-actions {
            display: flex;
            gap: 10px;
        }
        .charts-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .charts-section h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
            position: relative;
            height: 250px;
        }
        .heatmap-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .heatmap-section h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .heatmap {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }
        .heatmap-day {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
        }
        .heatmap-day.level-1 { background: #4ade80; opacity: 0.3; }
        .heatmap-day.level-2 { background: #4ade80; opacity: 0.5; }
        .heatmap-day.level-3 { background: #4ade80; opacity: 0.7; }
        .heatmap-day.level-4 { background: #4ade80; opacity: 1; }
        .history-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .history-section h2 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(233, 69, 96, 0.2);
        }
        .history-table th {
            color: #e94560;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .history-table td {
            color: #a0a0a0;
        }
        .history-table tr:hover td {
            color: #fff;
        }
        .completion-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .completion-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }
        .empty-state p {
            margin-top: 10px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            border: 2px solid rgba(233, 69, 96, 0.3);
            background: transparent;
            color: #a0a0a0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }
        .tab-btn:hover:not(.active) {
            border-color: #e94560;
            color: #e94560;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        @media (max-width: 768px) {
            .habits-grid {
                grid-template-columns: 1fr;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Habit Tracker</h1>
            <p>Build better habits, one day at a time</p>
        </header>

        <div class="add-habit">
            <h2>Add New Habit</h2>
            <div class="input-group">
                <input type="text" id="habitInput" placeholder="Enter habit name (e.g., 'Drink 8 glasses of water')">
                <button class="btn btn-primary" onclick="addHabit()">Add Habit</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('habits')">My Habits</button>
            <button class="tab-btn" onclick="switchTab('charts')">Analytics</button>
            <button class="tab-btn" onclick="switchTab('heatmap')">Activity</button>
            <button class="tab-btn" onclick="switchTab('history')">History</button>
        </div>

        <div id="habits-tab" class="tab-content active">
            <div id="habitsList" class="habits-grid"></div>
        </div>

        <div id="charts-tab" class="tab-content">
            <div class="charts-section">
                <h2>Analytics Dashboard</h2>
                <div class="charts-grid">
                    <div class="chart-container">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="habitBarChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="streakChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="completionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div id="heatmap-tab" class="tab-content">
            <div class="heatmap-section">
                <h2>90-Day Activity Heatmap</h2>
                <div id="heatmap" class="heatmap"></div>
            </div>
        </div>

        <div id="history-tab" class="tab-content">
            <div class="history-section">
                <h2>Check-in History</h2>
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Day</th>
                            <th>Completed</th>
                            <th>Total</th>
                            <th>Rate</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Data Management
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let checkIns = JSON.parse(localStorage.getItem('checkIns')) || {};

        function saveData() {
            localStorage.setItem('habits', JSON.stringify(habits));
            localStorage.setItem('checkIns', JSON.stringify(checkIns));
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function getDateString(date) {
            return date.toISOString().split('T')[0];
        }

        // Habit Management
        function addHabit() {
            const input = document.getElementById('habitInput');
            const name = input.value.trim();
            if (!name) return;

            const habit = {
                id: Date.now(),
                name: name,
                createdAt: getToday()
            };
            habits.push(habit);
            saveData();
            input.value = '';
            renderHabits();
            updateCharts();
        }

        function deleteHabit(id) {
            habits = habits.filter(h => h.id !== id);
            saveData();
            renderHabits();
            updateCharts();
        }

        function toggleCheckIn(habitId) {
            const today = getToday();
            if (!checkIns[today]) checkIns[today] = {};
            checkIns[today][habitId] = !checkIns[today][habitId];
            saveData();
            renderHabits();
            updateCharts();
            renderHeatmap();
            renderHistory();
        }

        function isCheckedIn(habitId, date) {
            return checkIns[date] && checkIns[date][habitId];
        }

        function getStreak(habitId) {
            let streak = 0;
            const today = new Date();
            for (let i = 0; i < 365; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = getDateString(date);
                if (isCheckedIn(habitId, dateStr)) {
                    streak++;
                } else if (i > 0) {
                    break;
                }
            }
            return streak;
        }

        function getBestStreak(habitId) {
            let bestStreak = 0;
            let currentStreak = 0;
            const sortedDates = Object.keys(checkIns).sort();
            let lastDate = null;

            sortedDates.forEach(dateStr => {
                if (checkIns[dateStr][habitId]) {
                    if (lastDate) {
                        const last = new Date(lastDate);
                        const current = new Date(dateStr);
                        const diff = (current - last) / (1000 * 60 * 60 * 24);
                        if (diff === 1) {
                            currentStreak++;
                        } else {
                            currentStreak = 1;
                        }
                    } else {
                        currentStreak = 1;
                    }
                    bestStreak = Math.max(bestStreak, currentStreak);
                    lastDate = dateStr;
                }
            });
            return bestStreak;
        }

        function getTotalCheckIns(habitId) {
            let total = 0;
            Object.values(checkIns).forEach(day => {
                if (day[habitId]) total++;
            });
            return total;
        }

        function get30DayRate(habitId) {
            let completed = 0;
            const today = new Date();
            for (let i = 0; i < 30; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                if (isCheckedIn(habitId, getDateString(date))) completed++;
            }
            return Math.round((completed / 30) * 100);
        }

        // Rendering
        function renderHabits() {
            const container = document.getElementById('habitsList');
            if (habits.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No habits yet</h3><p>Add your first habit above to get started!</p></div>';
                return;
            }

            container.innerHTML = habits.map(habit => {
                const streak = getStreak(habit.id);
                const bestStreak = getBestStreak(habit.id);
                const total = getTotalCheckIns(habit.id);
                const rate30 = get30DayRate(habit.id);
                const isDoneToday = isCheckedIn(habit.id, getToday());

                return `
                    <div class="habit-card">
                        <div class="habit-header">
                            <span class="habit-name">${habit.name}</span>
                        </div>
                        <div class="habit-stats">
                            <div class="stat-box">
                                <div class="stat-label">Current Streak</div>
                                <div class="stat-value">${streak}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Best Streak</div>
                                <div class="stat-value">${bestStreak}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">Total</div>
                                <div class="stat-value">${total}</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-label">30-Day Rate</div>
                                <div class="stat-value">${rate30}%</div>
                            </div>
                        </div>
                        <div class="habit-actions">
                            <button class="btn btn-check ${isDoneToday ? 'checked' : ''}" onclick="toggleCheckIn(${habit.id})">
                                ${isDoneToday ? '✓ Done' : 'Mark Done'}
                            </button>
                            <button class="btn btn-danger" onclick="deleteHabit(${habit.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmap');
            const days = [];
            const today = new Date();

            for (let i = 89; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = getDateString(date);
                
                let completed = 0;
                let total = habits.length;
                if (checkIns[dateStr]) {
                    completed = Object.values(checkIns[dateStr]).filter(v => v).length;
                }
                
                let level = 0;
                if (total > 0) {
                    const pct = completed / total;
                    if (pct > 0.75) level = 4;
                    else if (pct > 0.5) level = 3;
                    else if (pct > 0.25) level = 2;
                    else if (pct > 0) level = 1;
                }
                
                days.push(`<div class="heatmap-day level-${level}" title="${dateStr}: ${completed}/${total} habits"></div>`);
            }
            
            container.innerHTML = days.join('');
        }

        function renderHistory() {
            const tbody = document.getElementById('historyTable');
            const dates = Object.keys(checkIns).sort().reverse().slice(0, 30);
            
            if (dates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">No history yet</td></tr>';
                return;
            }

            tbody.innerHTML = dates.map(dateStr => {
                const date = new Date(dateStr);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const completed = checkIns[dateStr] ? Object.values(checkIns[dateStr]).filter(v => v).length : 0;
                const total = habits.length;
                const rate = total > 0 ? Math.round((completed / total) * 100) : 0;
                
                return `
                    <tr>
                        <td>${dateStr}</td>
                        <td>${dayName}</td>
                        <td>${completed}</td>
                        <td>${total}</td>
                        <td>
                            <div class="completion-bar">
                                <div class="completion-fill" style="width: ${rate}%"></div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Charts
        let weeklyChart, habitBarChart, streakChart, completionChart;

        function updateCharts() {
            updateWeeklyChart();
            updateHabitBarChart();
            updateStreakChart();
            updateCompletionChart();
        }

        function updateWeeklyChart() {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const labels = [];
            const data = [];
            const today = new Date();

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = getDateString(date);
                labels.push(date.toLocaleDateString('en-US', { weekday: 'short' }));
                
                let completed = 0;
                if (checkIns[dateStr]) {
                    completed = Object.values(checkIns[dateStr]).filter(v => v).length;
                }
                data.push(completed);
            }

            if (weeklyChart) weeklyChart.destroy();
            weeklyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Habits Completed',
                        data: data,
                        borderColor: '#e94560',
                        backgroundColor: 'rgba(233, 69, 96, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#a0a0a0' } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#a0a0a0', stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: '#a0a0a0' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        function updateHabitBarChart() {
            const ctx = document.getElementById('habitBarChart').getContext('2d');
            const labels = habits.map(h => h.name.substring(0, 15) + (h.name.length > 15 ? '...' : ''));
            const data = habits.map(h => getTotalCheckIns(h.id));

            if (habitBarChart) habitBarChart.destroy();
            habitBarChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Check-ins',
                        data: data,
                        backgroundColor: '#e94560'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#a0a0a0' } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#a0a0a0', stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: '#a0a0a0' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateStreakChart() {
            const ctx = document.getElementById('streakChart').getContext('2d');
            const labels = habits.map(h => h.name.substring(0, 15) + (h.name.length > 15 ? '...' : ''));
            const data = habits.map(h => getStreak(h.id));

            if (streakChart) streakChart.destroy();
            streakChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Current Streak',
                        data: data,
                        backgroundColor: '#4ade80',
                        indexAxis: 'y'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#a0a0a0' } }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { color: '#a0a0a0', stepSize: 1 },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            ticks: { color: '#a0a0a0' },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateCompletionChart() {
            const ctx = document.getElementById('completionChart').getContext('2d');
            const completed = habits.filter(h => isCheckedIn(h.id, getToday())).length;
            const remaining = habits.length - completed;

            if (completionChart) completionChart.destroy();
            completionChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Remaining'],
                    datasets: [{
                        data: [completed, remaining],
                        backgroundColor: ['#4ade80', 'rgba(255,255,255,0.1)'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { color: '#a0a0a0' } 
                        }
                    }
                }
            });
        }

        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            if (tab === 'charts') {
                setTimeout(updateCharts, 100);
            }
        }

        // Initialize
        document.getElementById('habitInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addHabit();
        });

        renderHabits();
        renderHeatmap();
        renderHistory();
    </script>
</body>
</html>
