<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e94560;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
        }
        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        header p {
            color: #a0a0a0;
            margin-top: 10px;
        }
        .add-habit {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .add-habit h2 {
            color: #e94560;
            margin-bottom: 15px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        .input-group input::placeholder {
            color: #888;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }
        .btn-secondary {
            background: #533483;
        }
        .btn-secondary:hover {
            background: #6b4c9a;
        }
        .btn-danger {
            background: #c0392b;
        }
        .btn-danger:hover {
            background: #e74c3c;
        }
        .habits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .habit-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }
        .habit-card:hover {
            transform: translateY(-5px);
        }
        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .habit-title {
            font-size: 1.3rem;
            color: #fff;
        }
        .habit-actions {
            display: flex;
            gap: 8px;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }
        .check-in-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .check-in-btn.checked {
            background: #27ae60;
        }
        .check-in-btn.checked:hover {
            background: #2ecc71;
        }
        .charts-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .charts-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            position: relative;
            height: 250px;
        }
        .heatmap-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .heatmap-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .heatmap {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 4px;
        }
        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            background: rgba(255,255,255,0.05);
        }
        .heatmap-cell.level-1 { background: #533483; }
        .heatmap-cell.level-2 { background: #7b5aa6; }
        .heatmap-cell.level-3 { background: #a37ec9; }
        .heatmap-cell.level-4 { background: #e94560; }
        .history-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .history-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .history-table th {
            color: #e94560;
            font-weight: 600;
        }
        .history-table td {
            color: #ccc;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .empty-state p {
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .habits-grid {
                grid-template-columns: 1fr;
            }
            .heatmap {
                grid-template-columns: repeat(7, 1fr);
            }
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Habit Tracker</h1>
            <p>Build better habits, one day at a time</p>
        </header>

        <div class="add-habit">
            <h2>Add New Habit</h2>
            <div class="input-group">
                <input type="text" id="habitInput" placeholder="Enter habit name (e.g., 'Drink 8 glasses of water')">
                <button class="btn" onclick="addHabit()">Add Habit</button>
            </div>
        </div>

        <div id="habitsContainer" class="habits-grid"></div>

        <div class="charts-section">
            <h2>Analytics</h2>
            <div class="charts-grid">
                <div class="chart-container">
                    <canvas id="weeklyChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="habitsChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="streakChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="completionChart"></canvas>
                </div>
            </div>
        </div>

        <div class="heatmap-section">
            <h2>Activity Heatmap (Last 90 Days)</h2>
            <div id="heatmap" class="heatmap"></div>
        </div>

        <div class="history-section">
            <h2>History</h2>
            <div id="historyContainer">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Habits Completed</th>
                            <th>Completion Rate</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Data management
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let checkIns = JSON.parse(localStorage.getItem('checkIns')) || {};

        function saveData() {
            localStorage.setItem('habits', JSON.stringify(habits));
            localStorage.setItem('checkIns', JSON.stringify(checkIns));
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function getDateString(date) {
            return date.toISOString().split('T')[0];
        }

        function addHabit() {
            const input = document.getElementById('habitInput');
            const name = input.value.trim();
            if (!name) return;

            const habit = {
                id: Date.now().toString(),
                name: name,
                createdAt: getToday()
            };
            habits.push(habit);
            saveData();
            input.value = '';
            renderHabits();
            updateCharts();
        }

        function deleteHabit(id) {
            if (!confirm('Delete this habit?')) return;
            habits = habits.filter(h => h.id !== id);
            // Clean up check-ins for this habit
            Object.keys(checkIns).forEach(date => {
                checkIns[date] = checkIns[date].filter(hid => hid !== id);
            });
            saveData();
            renderHabits();
            updateCharts();
        }

        function toggleCheckIn(habitId) {
            const today = getToday();
            if (!checkIns[today]) {
                checkIns[today] = [];
            }

            const index = checkIns[today].indexOf(habitId);
            if (index > -1) {
                checkIns[today].splice(index, 1);
            } else {
                checkIns[today].push(habitId);
            }
            saveData();
            renderHabits();
            updateCharts();
        }

        function isCheckedIn(habitId, date) {
            return checkIns[date] && checkIns[date].includes(habitId);
        }

        function getStreak(habitId) {
            let streak = 0;
            const today = new Date();
            
            for (let i = 0; i < 365; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = getDateString(date);
                
                if (isCheckedIn(habitId, dateStr)) {
                    streak++;
                } else if (i > 0) {
                    break;
                }
            }
            return streak;
        }

        function getBestStreak(habitId) {
            let bestStreak = 0;
            let currentStreak = 0;
            const sortedDates = Object.keys(checkIns).sort();
            let lastDate = null;

            sortedDates.forEach(dateStr => {
                if (checkIns[dateStr].includes(habitId)) {
                    if (lastDate) {
                        const last = new Date(lastDate);
                        const current = new Date(dateStr);
                        const diff = (current - last) / (1000 * 60 * 60 * 24);
                        if (diff === 1) {
                            currentStreak++;
                        } else {
                            currentStreak = 1;
                        }
                    } else {
                        currentStreak = 1;
                    }
                    bestStreak = Math.max(bestStreak, currentStreak);
                    lastDate = dateStr;
                }
            });
            return bestStreak;
        }

        function getTotalCheckIns(habitId) {
            return Object.values(checkIns).filter(day => day.includes(habitId)).length;
        }

        function getCompletionRate(habitId, days = 30) {
            const today = new Date();
            let completed = 0;
            let total = 0;

            for (let i = 0; i < days; i++) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = getDateString(date);
                
                // Only count days since habit creation
                const habit = habits.find(h => h.id === habitId);
                if (habit && dateStr >= habit.createdAt) {
                    total++;
                    if (isCheckedIn(habitId, dateStr)) {
                        completed++;
                    }
                }
            }
            return total > 0 ? Math.round((completed / total) * 100) : 0;
        }

        function renderHabits() {
            const container = document.getElementById('habitsContainer');
            
            if (habits.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No habits yet</h3><p>Add your first habit above to get started!</p></div>';
                return;
            }

            const today = getToday();
            container.innerHTML = habits.map(habit => {
                const streak = getStreak(habit.id);
                const bestStreak = getBestStreak(habit.id);
                const total = getTotalCheckIns(habit.id);
                const rate = getCompletionRate(habit.id);
                const isChecked = isCheckedIn(habit.id, today);

                return '<div class="habit-card">' +
                    '<div class="habit-header">' +
                        '<h3 class="habit-title">' + habit.name + '</h3>' +
                        '<div class="habit-actions">' +
                            '<button class="btn btn-danger btn-small" onclick="deleteHabit(' + habit.id + ')">Delete</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="stats-row">' +
                        '<div class="stat-box">' +
                            '<div class="stat-value">' + streak + '</div>' +
                            '<div class="stat-label">Current Streak</div>' +
                        '</div>' +
                        '<div class="stat-box">' +
                            '<div class="stat-value">' + bestStreak + '</div>' +
                            '<div class="stat-label">Best Streak</div>' +
                        '</div>' +
                        '<div class="stat-box">' +
                            '<div class="stat-value">' + total + '</div>' +
                            '<div class="stat-label">Total Check-ins</div>' +
                        '</div>' +
                        '<div class="stat-box">' +
                            '<div class="stat-value">' + rate + '%</div>' +
                            '<div class="stat-label">30-Day Rate</div>' +
                        '</div>' +
                    '</div>' +
                    '<button class="btn check-in-btn ' + (isChecked ? 'checked' : '') + '" onclick="toggleCheckIn(' + habit.id + ')">' +
                        (isChecked ? '✓ Checked In Today' : 'Check In Today') +
                    '</button>' +
                '</div>';
            }).join('');
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmap');
            const today = new Date();
            const cells = [];

            for (let i = 89; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = getDateString(date);
                
                const completed = checkIns[dateStr] ? checkIns[dateStr].length : 0;
                const total = habits.length;
                let level = 0;
                
                if (total > 0) {
                    const ratio = completed / total;
                    if (ratio >= 0.75) level = 4;
                    else if (ratio >= 0.5) level = 3;
                    else if (ratio >= 0.25) level = 2;
                    else if (ratio > 0) level = 1;
                }

                cells.push('<div class="heatmap-cell level-' + level + '" title="' + dateStr + ': ' + completed + '/' + total + '"></div>');
            }

            container.innerHTML = cells.join('');
        }

        function renderHistory() {
            const tbody = document.getElementById('historyTableBody');
            const sortedDates = Object.keys(checkIns).sort().reverse().slice(0, 30);
            
            if (sortedDates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No history yet</td></tr>';
                return;
            }

            tbody.innerHTML = sortedDates.map(date => {
                const completed = checkIns[date] ? checkIns[date].length : 0;
                const total = habits.length;
                const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

                return '<tr>' +
                    '<td>' + date + '</td>' +
                    '<td>' + completed + ' / ' + total + '</td>' +
                    '<td>' +
                        '<div class="progress-bar">' +
                            '<div class="progress-fill" style="width:' + rate + '%"></div>' +
                        '</div>' +
                        ' ' + rate + '%' +
                    '</td>' +
                '</tr>';
            }).join('');
        }

        // Charts
        let weeklyChart, habitsChart, streakChart, completionChart;

        function updateCharts() {
            updateWeeklyChart();
            updateHabitsChart();
            updateStreakChart();
            updateCompletionChart();
        }

        function updateWeeklyChart() {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const labels = [];
            const data = [];
            const today = new Date();

            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = getDateString(date);
                labels.push(date.toLocaleDateString('en-US', { weekday: 'short' }));
                data.push(checkIns[dateStr] ? checkIns[dateStr].length : 0);
            }

            if (weeklyChart) weeklyChart.destroy();
            weeklyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Habits Completed',
                        data: data,
                        borderColor: '#e94560',
                        backgroundColor: 'rgba(233, 69, 96, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Weekly Trend',
                            color: '#fff'
                        },
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        function updateHabitsChart() {
            const ctx = document.getElementById('habitsChart').getContext('2d');
            const labels = habits.map(h => h.name.substring(0, 15) + (h.name.length > 15 ? '...' : ''));
            const data = habits.map(h => getTotalCheckIns(h.id));

            if (habitsChart) habitsChart.destroy();
            habitsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Check-ins',
                        data: data,
                        backgroundColor: '#533483'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Check-ins by Habit',
                            color: '#fff'
                        },
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        function updateStreakChart() {
            const ctx = document.getElementById('streakChart').getContext('2d');
            const labels = habits.map(h => h.name.substring(0, 15) + (h.name.length > 15 ? '...' : ''));
            const data = habits.map(h => getStreak(h.id));

            if (streakChart) streakChart.destroy();
            streakChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Current Streak',
                        data: data,
                        backgroundColor: '#e94560',
                        indexAxis: 'y'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Current Streaks',
                            color: '#fff'
                        },
                        legend: {
                            labels: { color: '#fff' }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        y: {
                            ticks: { color: '#888' },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        }
                    }
                }
            });
        }

        function updateCompletionChart() {
            const ctx = document.getElementById('completionChart').getContext('2d');
            const labels = habits.map(h => h.name.substring(0, 15) + (h.name.length > 15 ? '...' : ''));
            const data = habits.map(h => getCompletionRate(h.id));

            if (completionChart) completionChart.destroy();
            completionChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: [
                            '#e94560', '#533483', '#0f3460', '#16213e', '#1a1a2e',
                            '#ff6b6b', '#7b5aa6', '#a37ec9', '#c0392b', '#27ae60'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: {
                            display: true,
                            text: '30-Day Completion Rates (%)',
                            color: '#fff'
                        },
                        legend: {
                            labels: { color: '#fff' },
                            position: 'right'
                        }
                    }
                }
            });
        }

        // Initialize
        document.getElementById('habitInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addHabit();
        });

        renderHabits();
        renderHeatmap();
        renderHistory();
        updateCharts();
    </script>
</body>
</html>
