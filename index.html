<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-3xl font-bold text-gray-800">Habit Tracker</h1>
            <p class="text-gray-500">Track your progress and build consistency.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-700 mb-2">Current Streak</h2>
                <div class="flex items-center space-x-2">
                    <span id="streakCount" class="text-4xl font-bold text-blue-600">0</span>
                    <span class="text-gray-500">days</span>
                </div>
            </div>
            
            <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">Daily Check-in</h2>
                <div class="flex items-center space-x-4">
                    <button onclick="checkIn()" id="checkInBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors">
                        Check In for Today
                    </button>
                    <p id="lastCheckIn" class="text-sm text-gray-500"></p>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Progress Chart</h2>
            <div class="h-64">
                <canvas id="habitChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">History</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-400 border-b">
                            <th class="pb-2">Date</th>
                            <th class="pb-2 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('habitTracker')) || [];
        function saveHabits() { localStorage.setItem('habitTracker', JSON.stringify(habits)); }
        function checkIn() {
            const today = new Date().toISOString().split('T')[0];
            if (habits.includes(today)) { alert('You already checked in today!'); return; }
            habits.push(today); habits.sort(); saveHabits(); updateUI();
        }
        function calculateStreak() {
            if (habits.length === 0) return 0;
            const today = new Date(); today.setHours(0,0,0,0);
            let streak = 0; let currentDay = new Date(); currentDay.setHours(0,0,0,0);
            const lastCheckInStr = habits[habits.length - 1];
            const lastCheckIn = new Date(lastCheckInStr); lastCheckIn.setHours(0,0,0,0);
            const diff = (today - lastCheckIn) / (1000 * 60 * 60 * 24);
            if (diff > 1) return 0;
            for (let i = habits.length - 1; i >= 0; i--) {
                const habitDate = new Date(habits[i]); habitDate.setHours(0,0,0,0);
                const expectedDate = new Date(currentDay); expectedDate.setDate(currentDay.getDate() - streak);
                if (habitDate.getTime() === expectedDate.getTime()) { streak++; }
                else if (habitDate.getTime() < expectedDate.getTime()) { break; }
            }
            return streak;
        }
        function updateUI() {
            const today = new Date().toISOString().split('T')[0];
            const checkInBtn = document.getElementById('checkInBtn');
            if (habits.includes(today)) {
                checkInBtn.disabled = true; checkInBtn.innerText = 'Checked In';
                checkInBtn.classList.replace('bg-blue-600', 'bg-green-500');
            }
            document.getElementById('streakCount').innerText = calculateStreak();
            updateChart();
            const tableBody = document.getElementById('historyTable');
            tableBody.innerHTML = '';
            [...habits].reverse().forEach(date => {
                const row = document.createElement('tr');
                row.className = 'border-b last:border-0';
                row.innerHTML = '<td class="py-3">' + date + '</td><td class="py-3 text-right"><span class="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">Completed</span></td>';
                tableBody.appendChild(row);
            });
        }
        let myChart;
        function updateChart() {
            const ctx = document.getElementById('habitChart').getContext('2d');
            const last7Days = []; const data = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                last7Days.push(dateStr); data.push(habits.includes(dateStr) ? 1 : 0);
            }
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: last7Days,
                    datasets: [{ label: 'Completed', data: data, backgroundColor: '#2563eb', borderRadius: 4 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 1, ticks: { stepSize: 1, callback: value => value === 1 ? 'Yes' : 'No' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
        updateUI();
    </script>
</body>
</html>
