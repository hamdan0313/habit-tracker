<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e94560;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
        }
        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        header p {
            color: #a0a0a0;
            margin-top: 10px;
        }
        .add-habit {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .add-habit h2 {
            color: #e94560;
            margin-bottom: 15px;
        }
        .add-habit input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .add-habit input:focus {
            outline: none;
            border-color: #e94560;
        }
        .add-habit button {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .add-habit button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        .habits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .habit-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.2s;
        }
        .habit-card:hover {
            transform: translateY(-5px);
        }
        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .habit-name {
            font-size: 1.2rem;
            color: #fff;
            font-weight: 600;
        }
        .habit-actions {
            display: flex;
            gap: 10px;
        }
        .btn-icon {
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: transform 0.2s;
        }
        .btn-icon:hover {
            transform: scale(1.2);
        }
        .check-in-btn {
            width: 100%;
            padding: 12px;
            border: 2px solid #e94560;
            background: transparent;
            color: #e94560;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .check-in-btn:hover {
            background: rgba(233, 69, 96, 0.1);
        }
        .check-in-btn.checked {
            background: #e94560;
            color: white;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .stat {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #a0a0a0;
        }
        .charts-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .charts-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
        }
        .chart-container h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .heatmap-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .heatmap-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .heatmap {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 4px;
        }
        .heatmap-day {
            aspect-ratio: 1;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
        }
        .heatmap-day.level-1 { background: rgba(233, 69, 96, 0.3); }
        .heatmap-day.level-2 { background: rgba(233, 69, 96, 0.5); }
        .heatmap-day.level-3 { background: rgba(233, 69, 96, 0.7); }
        .heatmap-day.level-4 { background: rgba(233, 69, 96, 1); }
        .history-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .history-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(233, 69, 96, 0.2);
        }
        .history-table th {
            color: #e94560;
            font-weight: 600;
        }
        .history-table td {
            color: #a0a0a0;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0a0a0;
        }
        @media (max-width: 768px) {
            .habits-grid {
                grid-template-columns: 1fr;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .heatmap {
                grid-template-columns: repeat(7, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Habit Tracker</h1>
            <p>Build better habits, one day at a time</p>
        </header>

        <div class="add-habit">
            <h2>Add New Habit</h2>
            <input type="text" id="habitInput" placeholder="Enter habit name (e.g., 'Drink 8 glasses of water')">
            <button onclick="addHabit()">Add Habit</button>
        </div>

        <div id="habitsContainer" class="habits-grid"></div>

        <div class="charts-section">
            <h2>Analytics</h2>
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>Weekly Trend</h3>
                    <canvas id="weeklyChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Habit Completion</h3>
                    <canvas id="completionChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Streak Comparison</h3>
                    <canvas id="streakChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>30-Day Rate</h3>
                    <canvas id="rateChart"></canvas>
                </div>
            </div>
        </div>

        <div class="heatmap-section">
            <h2>Activity Heatmap (Last 90 Days)</h2>
            <div id="heatmap" class="heatmap"></div>
        </div>

        <div class="history-section">
            <h2>History</h2>
            <div id="historyContainer">
                <table class="history-table" id="historyTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Habits Completed</th>
                            <th>Completion Rate</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let charts = {};

        function saveData() {
            localStorage.setItem('habits', JSON.stringify(habits));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function getDateDaysAgo(days) {
            const date = new Date();
            date.setDate(date.getDate() - days);
            return date.toISOString().split('T')[0];
        }

        function addHabit() {
            const input = document.getElementById('habitInput');
            const name = input.value.trim();
            if (!name) return;

            const habit = {
                id: generateId(),
                name: name,
                createdAt: getToday(),
                checkIns: []
            };

            habits.push(habit);
            saveData();
            input.value = '';
            renderHabits();
            updateCharts();
            updateHeatmap();
            updateHistory();
        }

        function deleteHabit(id) {
            habits = habits.filter(h => h.id !== id);
            saveData();
            renderHabits();
            updateCharts();
            updateHeatmap();
            updateHistory();
        }

        function toggleCheckIn(habitId) {
            const habit = habits.find(h => h.id === habitId);
            const today = getToday();
            const index = habit.checkIns.indexOf(today);

            if (index > -1) {
                habit.checkIns.splice(index, 1);
            } else {
                habit.checkIns.push(today);
            }

            saveData();
            renderHabits();
            updateCharts();
            updateHeatmap();
            updateHistory();
        }

        function getStreak(checkIns) {
            if (checkIns.length === 0) return 0;
            
            const sorted = [...checkIns].sort().reverse();
            let streak = 0;
            let currentDate = new Date();
            
            for (let dateStr of sorted) {
                const checkDate = new Date(dateStr);
                const diffDays = Math.floor((currentDate - checkDate) / (1000 * 60 * 60 * 24));
                
                if (diffDays === streak) {
                    streak++;
                } else if (diffDays > streak) {
                    break;
                }
            }
            
            return streak;
        }

        function getBestStreak(checkIns) {
            if (checkIns.length === 0) return 0;
            
            const sorted = [...checkIns].sort();
            let maxStreak = 1;
            let currentStreak = 1;
            
            for (let i = 1; i < sorted.length; i++) {
                const prev = new Date(sorted[i - 1]);
                const curr = new Date(sorted[i]);
                const diff = (curr - prev) / (1000 * 60 * 60 * 24);
                
                if (diff === 1) {
                    currentStreak++;
                    maxStreak = Math.max(maxStreak, currentStreak);
                } else if (diff > 1) {
                    currentStreak = 1;
                }
            }
            
            return maxStreak;
        }

        function get30DayRate(checkIns) {
            const thirtyDaysAgo = getDateDaysAgo(30);
            const recent = checkIns.filter(d => d >= thirtyDaysAgo);
            return Math.round((recent.length / 30) * 100);
        }

        function renderHabits() {
            const container = document.getElementById('habitsContainer');
            
            if (habits.length === 0) {
                container.innerHTML = '<div class="empty-state">No habits yet. Add your first habit above!</div>';
                return;
            }

            container.innerHTML = habits.map(habit => {
                const today = getToday();
                const isChecked = habit.checkIns.includes(today);
                const streak = getStreak(habit.checkIns);
                const bestStreak = getBestStreak(habit.checkIns);
                const total = habit.checkIns.length;
                const rate30 = get30DayRate(habit.checkIns);

                return `
                    <div class="habit-card">
                        <div class="habit-header">
                            <span class="habit-name">${habit.name}</span>
                            <div class="habit-actions">
                                <button class="btn-icon" onclick="deleteHabit('${habit.id}')">✕</button>
                            </div>
                        </div>
                        <button class="check-in-btn ${isChecked ? 'checked' : ''}" onclick="toggleCheckIn('${habit.id}')">
                            ${isChecked ? '✓ Completed Today' : 'Check In Today'}
                        </button>
                        <div class="stats">
                            <div class="stat">
                                <div class="stat-value">${streak}</div>
                                <div class="stat-label">Current Streak</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${bestStreak}</div>
                                <div class="stat-label">Best Streak</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${total}</div>
                                <div class="stat-label">Total Check-ins</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${rate30}%</div>
                                <div class="stat-label">30-Day Rate</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCharts() {
            const ctx1 = document.getElementById('weeklyChart');
            const ctx2 = document.getElementById('completionChart');
            const ctx3 = document.getElementById('streakChart');
            const ctx4 = document.getElementById('rateChart');

            if (charts.weekly) charts.weekly.destroy();
            if (charts.completion) charts.completion.destroy();
            if (charts.streak) charts.streak.destroy();
            if (charts.rate) charts.rate.destroy();

            if (habits.length === 0) return;

            // Weekly trend
            const weekLabels = [];
            const weekData = [];
            for (let i = 6; i >= 0; i--) {
                const date = getDateDaysAgo(i);
                weekLabels.push(new Date(date).toLocaleDateString('en', { weekday: 'short' }));
                const count = habits.filter(h => h.checkIns.includes(date)).length;
                weekData.push(count);
            }

            charts.weekly = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: weekLabels,
                    datasets: [{
                        label: 'Habits Completed',
                        data: weekData,
                        borderColor: '#e94560',
                        backgroundColor: 'rgba(233, 69, 96, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#a0a0a0' }, grid: { display: false } }
                    }
                }
            });

            // Completion per habit
            charts.completion = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: habits.map(h => h.name.substring(0, 15) + (h.name.length > 15 ? '...' : '')),
                    datasets: [{
                        label: 'Total Check-ins',
                        data: habits.map(h => h.checkIns.length),
                        backgroundColor: '#e94560'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#a0a0a0' }, grid: { display: false } }
                    }
                }
            });

            // Streak comparison
            charts.streak = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: habits.map(h => h.name.substring(0, 10) + (h.name.length > 10 ? '...' : '')),
                    datasets: [{
                        label: 'Current Streak',
                        data: habits.map(h => getStreak(h.checkIns)),
                        backgroundColor: '#e94560',
                        borderRadius: 5
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: true, ticks: { color: '#a0a0a0' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#a0a0a0' }, grid: { display: false } }
                    }
                }
            });

            // 30-day rate doughnut
            const avgRate = habits.length > 0 
                ? Math.round(habits.reduce((sum, h) => sum + get30DayRate(h.checkIns), 0) / habits.length)
                : 0;

            charts.rate = new Chart(ctx4, {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'Remaining'],
                    datasets: [{
                        data: [avgRate, 100 - avgRate],
                        backgroundColor: ['#e94560', 'rgba(255,255,255,0.1)'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '70%',
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    }
                },
                plugins: [{
                    id: 'textCenter',
                    beforeDraw: function(chart) {
                        const ctx = chart.ctx;
                        ctx.save();
                        ctx.font = 'bold 24px Segoe UI';
                        ctx.fillStyle = '#e94560';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(avgRate + '%', chart.chartArea.left + (chart.chartArea.right - chart.chartArea.left) / 2, chart.chartArea.top + (chart.chartArea.bottom - chart.chartArea.top) / 2);
                        ctx.restore();
                    }
                }]
            });
        }

        function updateHeatmap() {
            const container = document.getElementById('heatmap');
            const days = 91;
            let html = '';

            for (let i = days - 1; i >= 0; i--) {
                const date = getDateDaysAgo(i);
                const count = habits.filter(h => h.checkIns.includes(date)).length;
                const maxHabits = habits.length || 1;
                const level = count === 0 ? 0 : Math.ceil((count / maxHabits) * 4);
                
                html += `<div class="heatmap-day level-${level}" title="${date}: ${count} habits completed"></div>`;
            }

            container.innerHTML = html;
        }

        function updateHistory() {
            const tbody = document.getElementById('historyBody');
            const history = [];

            // Collect all dates with check-ins
            const allDates = new Set();
            habits.forEach(h => h.checkIns.forEach(d => allDates.add(d)));
            
            const sortedDates = Array.from(allDates).sort().reverse();

            if (sortedDates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No history yet</td></tr>';
                return;
            }

            sortedDates.slice(0, 30).forEach(date => {
                const completed = habits.filter(h => h.checkIns.includes(date)).length;
                const rate = habits.length > 0 ? Math.round((completed / habits.length) * 100) : 0;
                
                history.push({
                    date: new Date(date).toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' }),
                    completed: completed,
                    total: habits.length,
                    rate: rate
                });
            });

            tbody.innerHTML = history.map(h => `
                <tr>
                    <td>${h.date}</td>
                    <td>${h.completed} / ${h.total}</td>
                    <td>${h.rate}%</td>
                </tr>
            `).join('');
        }

        // Handle Enter key in input
        document.getElementById('habitInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addHabit();
        });

        // Initial render
        renderHabits();
        updateCharts();
        updateHeatmap();
        updateHistory();
    </script>
</body>
</html>
