<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e94560;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
        }
        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        header p {
            color: #a0a0a0;
            margin-top: 10px;
        }
        .add-habit {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .add-habit h2 {
            color: #e94560;
            margin-bottom: 15px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        .input-group input::placeholder {
            color: #888;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #e94560;
            color: white;
        }
        .btn-primary:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        .btn-danger {
            background: #ff4757;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
        }
        .btn-danger:hover {
            background: #ff6b81;
        }
        .habits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .habit-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.2);
            transition: transform 0.3s ease;
        }
        .habit-card:hover {
            transform: translateY(-5px);
            border-color: rgba(233, 69, 96, 0.5);
        }
        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .habit-name {
            font-size: 1.3rem;
            color: #fff;
            font-weight: 600;
        }
        .habit-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #888;
        }
        .check-in-btn {
            width: 100%;
            padding: 15px;
            border: 2px solid #e94560;
            background: transparent;
            color: #e94560;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .check-in-btn:hover {
            background: #e94560;
            color: white;
        }
        .check-in-btn.checked {
            background: #2ecc71;
            border-color: #2ecc71;
            color: white;
        }
        .charts-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .charts-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 15px;
        }
        .chart-container h3 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        .heatmap-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .heatmap-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .heatmap {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            justify-content: center;
        }
        .heatmap-day {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
        }
        .heatmap-day.level-1 { background: #e94560; opacity: 0.3; }
        .heatmap-day.level-2 { background: #e94560; opacity: 0.5; }
        .heatmap-day.level-3 { background: #e94560; opacity: 0.7; }
        .heatmap-day.level-4 { background: #e94560; opacity: 1; }
        .history-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.2);
        }
        .history-section h2 {
            color: #e94560;
            margin-bottom: 20px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
        }
        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .history-table th {
            color: #e94560;
            font-weight: 600;
        }
        .history-table td {
            color: #ccc;
        }
        .history-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            .habits-grid {
                grid-template-columns: 1fr;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Habit Tracker</h1>
            <p>Build better habits, one day at a time</p>
        </header>

        <div class="add-habit">
            <h2>Add New Habit</h2>
            <div class="input-group">
                <input type="text" id="habitInput" placeholder="Enter habit name (e.g., 'Read 30 minutes')">
                <button class="btn btn-primary" onclick="addHabit()">Add Habit</button>
            </div>
        </div>

        <div id="habitsContainer" class="habits-grid"></div>

        <div class="charts-section">
            <h2>Analytics</h2>
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>Weekly Trend</h3>
                    <canvas id="weeklyChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Habit Completion</h3>
                    <canvas id="completionChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Streak Comparison</h3>
                    <canvas id="streakChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Completion Rate</h3>
                    <canvas id="rateChart"></canvas>
                </div>
            </div>
        </div>

        <div class="heatmap-section">
            <h2>Activity Heatmap (Last 90 Days)</h2>
            <div id="heatmap" class="heatmap"></div>
        </div>

        <div class="history-section">
            <h2>History</h2>
            <div id="historyContainer">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Habits Completed</th>
                            <th>Completion Rate</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let habits = JSON.parse(localStorage.getItem('habits')) || [];
        let checkIns = JSON.parse(localStorage.getItem('checkIns')) || {};
        let charts = {};

        function saveData() {
            localStorage.setItem('habits', JSON.stringify(habits));
            localStorage.setItem('checkIns', JSON.stringify(checkIns));
        }

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function getDateDaysAgo(days) {
            const date = new Date();
            date.setDate(date.getDate() - days);
            return date.toISOString().split('T')[0];
        }

        function addHabit() {
            const input = document.getElementById('habitInput');
            const name = input.value.trim();
            if (!name) return;

            const habit = {
                id: Date.now().toString(),
                name: name,
                createdAt: getToday()
            };
            habits.push(habit);
            saveData();
            input.value = '';
            renderHabits();
            updateCharts();
        }

        function deleteHabit(id) {
            habits = habits.filter(h => h.id !== id);
            Object.keys(checkIns).forEach(date => {
                checkIns[date] = checkIns[date].filter(hid => hid !== id);
            });
            saveData();
            renderHabits();
            updateCharts();
        }

        function toggleCheckIn(habitId) {
            const today = getToday();
            if (!checkIns[today]) {
                checkIns[today] = [];
            }
            
            const index = checkIns[today].indexOf(habitId);
            if (index > -1) {
                checkIns[today].splice(index, 1);
            } else {
                checkIns[today].push(habitId);
            }
            
            saveData();
            renderHabits();
            updateCharts();
        }

        function isCheckedIn(habitId, date = getToday()) {
            return checkIns[date] && checkIns[date].includes(habitId);
        }

        function getStreak(habitId) {
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const date = getDateDaysAgo(i);
                if (isCheckedIn(habitId, date)) {
                    streak++;
                } else if (i > 0) {
                    break;
                }
            }
            return streak;
        }

        function getBestStreak(habitId) {
            let best = 0;
            let current = 0;
            for (let i = 365; i >= 0; i--) {
                const date = getDateDaysAgo(i);
                if (isCheckedIn(habitId, date)) {
                    current++;
                    best = Math.max(best, current);
                } else {
                    current = 0;
                }
            }
            return best;
        }

        function getTotalCheckIns(habitId) {
            let total = 0;
            Object.values(checkIns).forEach(habitIds => {
                if (habitIds.includes(habitId)) total++;
            });
            return total;
        }

        function getCompletionRate(habitId) {
            const created = new Date(habits.find(h => h.id === habitId)?.createdAt || getToday());
            const daysSince = Math.floor((new Date() - created) / (1000 * 60 * 60 * 24)) + 1;
            const checkins = getTotalCheckIns(habitId);
            return Math.round((checkins / daysSince) * 100);
        }

        function getLast30DaysRate(habitId) {
            let completed = 0;
            for (let i = 0; i < 30; i++) {
                if (isCheckedIn(habitId, getDateDaysAgo(i))) completed++;
            }
            return Math.round((completed / 30) * 100);
        }

        function renderHabits() {
            const container = document.getElementById('habitsContainer');
            if (habits.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                        </svg>
                        <p>No habits yet. Add your first habit above!</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = habits.map(habit => {
                const streak = getStreak(habit.id);
                const bestStreak = getBestStreak(habit.id);
                const total = getTotalCheckIns(habit.id);
                const rate30 = getLast30DaysRate(habit.id);
                const checkedToday = isCheckedIn(habit.id);

                return `
                    <div class="habit-card">
                        <div class="habit-header">
                            <span class="habit-name">${habit.name}</span>
                            <button class="btn btn-danger" onclick="deleteHabit('${habit.id}')">Delete</button>
                        </div>
                        <div class="habit-stats">
                            <div class="stat">
                                <div class="stat-value">${streak}</div>
                                <div class="stat-label">Current Streak</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${bestStreak}</div>
                                <div class="stat-label">Best Streak</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${total}</div>
                                <div class="stat-label">Total Check-ins</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${rate30}%</div>
                                <div class="stat-label">30-Day Rate</div>
                            </div>
                        </div>
                        <button class="check-in-btn ${checkedToday ? 'checked' : ''}" onclick="toggleCheckIn('${habit.id}')">
                            ${checkedToday ? '✓ Checked In Today' : 'Check In Today'}
                        </button>
                    </div>
                `;
            }).join('');
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmap');
            let html = '';
            for (let i = 89; i >= 0; i--) {
                const date = getDateDaysAgo(i);
                const count = checkIns[date]?.length || 0;
                const maxHabits = habits.length || 1;
                const level = count === 0 ? 0 : Math.ceil((count / maxHabits) * 4);
                html += `<div class="heatmap-day level-${level}" title="${date}: ${count} habits completed"></div>`;
            }
            container.innerHTML = html;
        }

        function renderHistory() {
            const tbody = document.getElementById('historyTableBody');
            const dates = Object.keys(checkIns).sort().reverse().slice(0, 30);
            
            if (dates.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888;">No history yet</td></tr>';
                return;
            }

            tbody.innerHTML = dates.map(date => {
                const completed = checkIns[date]?.length || 0;
                const total = habits.length || 1;
                const rate = Math.round((completed / total) * 100);
                
                return `
                    <tr>
                        <td>${date}</td>
                        <td>${completed} / ${total}</td>
                        <td>${rate}%</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${rate}%"></div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateCharts() {
            const colors = ['#e94560', '#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            
            // Weekly Trend Chart
            const weeklyCtx = document.getElementById('weeklyChart');
            if (charts.weekly) charts.weekly.destroy();
            
            const last7Days = Array.from({length: 7}, (_, i) => {
                const date = getDateDaysAgo(6 - i);
                return {
                    date: date.slice(5),
                    count: checkIns[date]?.length || 0
                };
            });

            charts.weekly = new Chart(weeklyCtx, {
                type: 'line',
                data: {
                    labels: last7Days.map(d => d.date),
                    datasets: [{
                        label: 'Habits Completed',
                        data: last7Days.map(d => d.count),
                        borderColor: '#e94560',
                        backgroundColor: 'rgba(233, 69, 96, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#888' }, grid: { display: false } }
                    }
                }
            });

            // Completion Chart (per habit)
            const completionCtx = document.getElementById('completionChart');
            if (charts.completion) charts.completion.destroy();

            charts.completion = new Chart(completionCtx, {
                type: 'bar',
                data: {
                    labels: habits.map(h => h.name.slice(0, 15)),
                    datasets: [{
                        label: 'Total Check-ins',
                        data: habits.map(h => getTotalCheckIns(h.id)),
                        backgroundColor: colors
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#888' }, grid: { display: false } }
                    }
                }
            });

            // Streak Chart
            const streakCtx = document.getElementById('streakChart');
            if (charts.streak) charts.streak.destroy();

            charts.streak = new Chart(streakCtx, {
                type: 'bar',
                data: {
                    labels: habits.map(h => h.name.slice(0, 15)),
                    datasets: [
                        {
                            label: 'Current Streak',
                            data: habits.map(h => getStreak(h.id)),
                            backgroundColor: '#e94560'
                        },
                        {
                            label: 'Best Streak',
                            data: habits.map(h => getBestStreak(h.id)),
                            backgroundColor: '#0ea5e9'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    scales: {
                        x: { beginAtZero: true, ticks: { color: '#888' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        y: { ticks: { color: '#888' }, grid: { display: false } }
                    }
                }
            });

            // Rate Chart
            const rateCtx = document.getElementById('rateChart');
            if (charts.rate) charts.rate.destroy();

            const completionRates = habits.map(h => getCompletionRate(h.id));
            charts.rate = new Chart(rateCtx, {
                type: 'doughnut',
                data: {
                    labels: habits.map(h => h.name.slice(0, 15)),
                    datasets: [{
                        data: completionRates,
                        backgroundColor: colors
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#888', font: { size: 10 } } }
                    }
                }
            });
        }

        // Initialize
        document.getElementById('habitInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addHabit();
        });

        renderHabits();
        renderHeatmap();
        renderHistory();
        if (habits.length > 0) updateCharts();
    </script>
</body>
</html>
